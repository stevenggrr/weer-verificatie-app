name: Automatische Weer Scraper

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Installeer dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installeer Playwright browsers
        run: playwright install chromium

      - name: Run scraper script
        run: python scraper.py

      - name: Commit en push gewijzigde database naar GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weer_verificatie_database.xlsx
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Automatische update weer-database door scraper" && git push)
